<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝最爱的妈妈生日快乐！</title>
    <style>
        :root {
            --primary-color: #ff85a2;
            --bg-color: #fff5f7;
            --text-color: #4a4a4a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 133, 162, 0.2);
            text-align: center;
            max-width: 85%;
            z-index: 10;
            animation: fadeIn 2s ease-in;
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        p {
            line-height: 1.8;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .heart {
            color: #ff4d6d;
            font-size: 50px;
            animation: beat 1.2s infinite;
            display: inline-block;
        }

        .footer-wish {
            font-weight: bold;
            color: var(--primary-color);
        }

        /* 背景漂浮的心 */
        .floating-heart {
            position: absolute;
            color: rgba(255, 133, 162, 0.3);
            user-select: none;
            pointer-events: none;
            animation: float 6s linear infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
		.card img {
		    width: 150px;
		    height: 150px;
		    object-fit: cover; /* 确保照片在圆形里不拉伸 */
		    border-radius: 50%; /* 变成正圆 */
		    border: 3px solid #ff85a2; /* 加上粉色的边框 */
		    margin: 10px auto;
		}
    </style>
</head>

        <div class="heart">❤️</div>

    <script>
        // 自动生成背景漂浮的小爱心
        function createHearts() {
            const heartIcons = ['🌸', '❤️', '💕', '🎂', '✨'];
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'floating-heart';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                    heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                    heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                    document.body.appendChild(heart);
                    
                    // 动画结束后移除元素
                    setTimeout(() => heart.remove(), 6000);
                }, i * 300);
            }
        }
        
        // 循环生成
        setInterval(createHearts, 3000);
        createHearts();
    </script>
